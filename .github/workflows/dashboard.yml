name: Opdater dashboard

on:
  # Manuel knap på GitHub (Actions-fanen)
  workflow_dispatch:
    inputs:
      besked:
        description: 'Valgfri kommentar (vises i commit-besked)'
        required: false
        default: 'manuel opdatering'

  # Automatisk når datafiler ændres på main
  push:
    branches: [main]
    paths:
      - 'data/**.csv'
      - 'data/**.json'
      - 'data/dashboard_template.html'

jobs:
  byg-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Hent repo
        uses: actions/checkout@v4

      - name: Opsæt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer pakker
        run: pip install pandas numpy requests

      - name: Generer dashboard
        run: python scripts/08_dashboard.py

      - name: Commit og push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "Ingen ændringer" && exit 0
          BESKED="${{ github.event.inputs.besked || 'auto-opdatering' }}"
          git commit -m "Auto: dashboard $BESKED [skip ci]"
          git push
